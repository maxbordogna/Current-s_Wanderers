<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; }
    video { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
  <video id="stream" autoplay muted playsinline></video>
  <script>
    const url = "https://ranking-census-goal.ngrok-free.app/live/whep";
    const pc = new RTCPeerConnection();
    pc.addTransceiver("video", { direction: "recvonly" });
    pc.addTransceiver("audio", { direction: "recvonly" });

    pc.ontrack = e => document.getElementById("stream").srcObject = e.streams[0];

    pc.createOffer().then(offer => {
      pc.setLocalDescription(offer);
      return fetch(url, {
        method: "POST",
        headers: { 
          "Content-Type": "application/sdp",
          "ngrok-skip-browser-warning": "true"
        },
        body: offer.sdp
      });
    }).then(r => r.text()).then(sdp => {
      pc.setRemoteDescription({ type: "answer", sdp });
    });
  </script>
</body>
</html>
