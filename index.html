<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      position: relative;
      overflow: hidden;
    }

    @media (orientation: landscape) {
      .wrapper {
        width: 100vw;
        height: 100vh;
      }
    }

    /* in verticale: l'iframe 16:9 deve essere largo 
       abbastanza che il quadrato centrale = 100vw
       il quadrato è 9/16 della larghezza dell'iframe
       quindi larghezza iframe = 100vw * 16/9 */
    @media (orientation: portrait) {
      .wrapper {
        width: 177.78vw; /* 100 * 16/9 */
        height: 100vw;   /* quadrato = 100vw di larghezza */
        margin-left: -38.89vw; /* centra: (177.78 - 100) / 2 */
      }
    }

    iframe {
      position: absolute;
      top: -60px;
      left: -60px;
      width: calc(100% + 120px);
      height: calc(100% + 120px);
      border: none;
      pointer-events: none;
    }

    .blocker {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <iframe
      src="https://www.youtube.com/embed/rHjPFe-3I1E?autoplay=1&mute=1&controls=0&disablekb=1&modestbranding=1&playsinline=1&rel=0&iv_load_policy=3"
      allow="autoplay; fullscreen">
    </iframe>
    <div class="blocker"></div>
  </div>
</body>
</html>
